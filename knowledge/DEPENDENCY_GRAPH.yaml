events: []
# No event bus, message broker, or publish/subscribe mechanism exists in the
# repository. grep for EventEmitter/emit/on/amqp/kafka/redis/bull/pubsub/subscribe
# across backend/src returned only Node process signals (server.ts) and an OPTIONAL
# unused REDIS_URL env var (config/env.ts:15). Cross-module notification delivery is
# a synchronous, fire-and-forget in-process service call (see the four `calls` edges
# to notification-service), NOT asynchronous eventing. The Prisma `NotificationType`
# enum (schema.prisma:89) is a set of notification CATEGORIES, not domain events.
# Therefore publishes/consumes relationships are: NONE (not UNKNOWN — verified absent).

