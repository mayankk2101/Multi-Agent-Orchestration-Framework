      - backend-users
      - backend-crm
      - backend-hotel-workers
      - backend-work-requests
      - backend-work-applications
      - backend-assignments
      - backend-attendance
      - backend-quality
      - backend-notifications
      - backend-analytics
      - backend-hr
      - backend-calendar
  - id: auth-middleware
