analysis:
  circular_dependencies:
    code_imports: none
    note: "No backend module imports another module except the notification-service singleton (notifications imports no other module), so the static import graph is acyclic. A DATA-level bidirectional coupling exists between backend-work-requests and backend-work-applications (work-requests reads WorkApplication; work-applications reads and writes WorkRequest) via shared Prisma models, but this is not a code-import cycle."
  orphan_modules:
    - { id: backend-chatbot, reason: "placeholder-unregistered; only .placeholder file; no imports, no mount, no client." }
    - { id: backend-geo, reason: "placeholder-unregistered; only .placeholder file; no imports, no mount, no client." }
    - { id: backend-calendar, reason: "mounted at runtime (routes/v1/index.ts:34) but stub (all methods throw NotImplementedError); no discovered client consumer and no cross-module edge." }
  stub_but_registered:
    - { id: backend-hr, note: "stub service (NotImplementedError) but consumed by mobile-worker (/hr) and mounted at runtime." }
    - { id: backend-calendar, note: "stub service (NotImplementedError); mounted but no consumer discovered." }
  unknown_relationships:
    - "All module owners (node owner) and contract versions are UNKNOWN — human assignment required (per MODULE_REGISTRY.yaml)."
    - "state-user authoritative_writer UNKNOWN (auth and users both write)."
    - "state-audit-log authoritative_writer UNKNOWN (shared via BaseService)."

remaining_human_decisions:
  - "Assign an accountable owner to every module, shared contract, and state domain (all currently UNKNOWN)."
  - "Designate the authoritative writer for state-user (backend-auth vs backend-users both write the User model)."
  - "Confirm the intentional cross-module write coupling in the accept-application transaction: backend-work-applications creating/mutating WorkRequest, WorkerAssignment, and Attendance records owned by other modules (backend/src/modules/work-applications/service.ts:219-283). Decide whether this is approved architectural coupling or should be delegated to the owning modules' services."
  - "Decide retirement or activation of backend-chatbot and backend-geo (unregistered placeholders) and completion of stub modules backend-hr and backend-calendar."
  - "Assign contract versions to notification-service, prisma-schema, base-service, and the middleware contracts (all currently unversioned)."
