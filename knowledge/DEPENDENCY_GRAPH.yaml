runtime:
  # Repository-derived runtime bootstrap and route registration (Agent 2 scope).
  bootstrap:
    - "backend/src/server.ts starts the process and creates the app via createApp()."
    - "backend/src/app.ts mounts v1 router at /api/${API_VERSION}: app.use(`/api/${env.API_VERSION}`, v1Router) (app.ts:51)."
    - "backend/src/routes/v1/index.ts registers every active backend module router (index.ts:22-34)."
    - "All services obtain the shared PrismaClient through BaseService (backend/src/lib/base-service.ts:5 -> lib/db.ts getPrisma), a single runtime persistence dependency."
  route_registration:
    - { module: backend-auth, mount: "/api/v1/auth", evidence: "backend/src/routes/v1/index.ts:22" }
    - { module: backend-users, mount: "/api/v1/users", evidence: "backend/src/routes/v1/index.ts:23" }
    - { module: backend-crm, mount: "/api/v1/crm", evidence: "backend/src/routes/v1/index.ts:24" }
    - { module: backend-hotel-workers, mount: "/api/v1/crm/hotels/:hotel_id/workers", nested_under: backend-crm, evidence: "backend/src/routes/v1/index.ts:25" }
    - { module: backend-work-requests, mount: "/api/v1/work-requests", evidence: "backend/src/routes/v1/index.ts:26" }
    - { module: backend-work-applications, mount: "/api/v1/work-requests/:id/applications", nested_under: backend-work-requests, evidence: "backend/src/routes/v1/index.ts:27" }
    - { module: backend-assignments, mount: "/api/v1/assignments", evidence: "backend/src/routes/v1/index.ts:28" }
    - { module: backend-attendance, mount: "/api/v1/attendance", evidence: "backend/src/routes/v1/index.ts:29" }
    - { module: backend-quality, mount: "/api/v1/quality", evidence: "backend/src/routes/v1/index.ts:30" }
    - { module: backend-hr, mount: "/api/v1/hr", evidence: "backend/src/routes/v1/index.ts:31" }
    - { module: backend-notifications, mount: "/api/v1/notifications", evidence: "backend/src/routes/v1/index.ts:32" }
    - { module: backend-analytics, mount: "/api/v1/analytics", evidence: "backend/src/routes/v1/index.ts:33" }
    - { module: backend-calendar, mount: "/api/v1/calendar", evidence: "backend/src/routes/v1/index.ts:34" }
  middleware_registration:
    - "optionalAuthMiddleware applied to the whole v1 router (routes/v1/index.ts:20)."
    - "authMiddleware / requireRole / requirePermission / checkHotelAccess applied per-module in each module's routes.ts (backend/src/middleware/auth.ts, backend/src/middleware/permissions.ts)."
    - "requestLoggerMiddleware, CORS, errorHandler, notFoundHandler registered globally in app.ts:18,21,54,57."
  unregistered:
    - "backend-chatbot and backend-geo are NOT imported or mounted (only a .placeholder file exists). No runtime relationship."

contracts:
  - id: notification-service
    version: unversioned
    owner_module: backend-notifications
    source: backend/src/modules/notifications/service.ts
    interface: "notificationService.sendNotification(userId, NotificationPayload); getNotifications; markAsRead"
    payload_contract: "backend/src/modules/notifications/types.ts (NotificationPayload)"
    consumers:
      - backend-work-requests
      - backend-work-applications
      - backend-attendance
      - backend-quality
  - id: prisma-schema
    version: unversioned
    owner_module: UNKNOWN
    source: backend/prisma/schema.prisma
    note: "Central shared data contract. Consumed by every active backend module through @prisma/client types and the shared PrismaClient (BaseService)."
    consumers:
      - backend-auth
      - backend-users
      - backend-crm
      - backend-hotel-workers
      - backend-work-requests
      - backend-work-applications
      - backend-assignments
      - backend-attendance
