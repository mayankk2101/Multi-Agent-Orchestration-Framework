node_schema:
  required: [id, kind, owner, source]
  kinds: [module, client, infrastructure, contract, event, state-domain, external-service]

edge_schema:
  required: [id, source, target, kind, evidence, status]
  kinds: [calls, imports, consumes-api, publishes-event, consumes-event, reads-state, writes-state, shared-contract, deploys-to, package]
  compatibility: [compatible, conditional, breaking, unknown, not-applicable]

