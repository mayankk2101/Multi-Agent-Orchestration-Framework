schema_version: 1
purpose: >-
  Repository Session record (framework 1.2.0). Persists revision-bound Context
  Artifacts across multiple workflows within one repository revision so
  repository discovery, dependency slicing, and boot-policy loading are NOT
  repeated per workflow. Canonical mechanism is defined once in
  constitution/CONTEXT_ARTIFACTS.md §6; this file is the machine-readable
  per-session record and is never a substitute for current repository truth.
scope: project-runtime  # session instances are project runtime state; the mechanism is framework
canonical_policy: .claude/constitution/CONTEXT_ARTIFACTS.md
version_source: .claude/VERSION.yaml

# A session is valid only while its baseline_revision matches HEAD and no
# context_invalidator (see SYNC_STATE.yaml) has fired for the artifact in question.
# On baseline_revision or default-branch change the whole session invalidates.

session:
  active: true
  baseline_revision: 39fc1f5cef778f4a76af79236d6911bee696dd5d
  default_branch: main
  framework_version: see .claude/VERSION.yaml   # 1.3.0
  opened_at: "2026-07-14T00:00:00Z"
  note: >-
    Rebound by SYNC-036 (Repository Synchronization Workflow, Package A of
    `docs/audits/REPOSITORY_SPECIFICATION_AUDIT_2026-07-14.md`). The prior
    `e3607a9` stamp (bound by SYNC-034) was four merges stale: PR #140
    (SYNC-034's own rebind), PR #141 (`ADR-016`/`SPEC-COMPLIANCE-001`
    authoring, `SYNC-035`), PR #142 (execution-policy documentation), and
    PR #143 (this audit) landed on `main` since, advancing HEAD to `39fc1f5`
    with zero local worktree divergence (clean tree; local `main` ==
    `origin/main`). This session applied the audit's Package A corrections:
    ADR-016 fully propagated into `OWNERSHIP_INDEX.yaml`/`BOUNDARY_INDEX.yaml`
    (closing AUDIT-H1, the cross-index contradiction `SYNC-035` left
    incomplete); all nine project-runtime indexes plus this file and
    `SYNC_STATE.yaml`'s `cache_state` rebound (AUDIT-H4, closing this file's
    own stale-`active`-flag instance of AUDIT-L5); `SPECIFICATION_INDEX.yaml`
    CRM/calendar pointers synchronized to `MODULE_REGISTRY.yaml` (AUDIT-M2/
    AUDIT-L1); `backend-compliance`/`backend-retention` zero-code-deferral
    rationale disclosed in `MODULE_REGISTRY.yaml` (AUDIT-M1);
    `edge-analytics-reads-hotel-worker` applied to `DEPENDENCY_GRAPH.yaml`
    and the `state-hotel-worker` reader count reconciled to 5 (AUDIT-M3/
    AUDIT-L2). See `SYNC_STATE.yaml` SYNC-036 for the full record.
    Downstream workflows at the same baseline_revision reuse this session's
    evidence by reference instead of re-running discovery. Invalidates on the
    next baseline_revision or default-branch change (CONTEXT_ARTIFACTS.md §6).

# Context Artifacts produced/reused this session. Each entry records its cache
# key and validity so a later workflow reuses instead of rediscovering.
context_artifacts:
  boot_context:
    id: ART-BOOT-001
    cache_scope: framework-version
    key: see .claude/VERSION.yaml current_version   # 1.3.0
    valid: bound
  evidence_package:
    id: ART-EVID-001
    cache_scope: revision
    key: baseline_revision
    valid: bound
    body: [ART-REPO-001, ART-REPO-002, ART-REPO-003]
  dependency_context:
    # one entry per capability/module-set slice, keyed baseline_revision + capability
    cache_scope: revision+capability
    slices: []
  module_memory:
    # populated from MODULE_MEMORY.yaml on each spec freeze
    cache_scope: module+freeze-revision
    modules: []

reuse_policy:
  - A workflow entering pre-flight reuses a valid artifact for the current baseline_revision instead of re-running discovery.
  - Repository discovery runs at most once per baseline_revision per session.
  - On any doubt about validity, the artifact is treated as stale and reproduced (CONTEXT_ARTIFACTS.md §1.5 fail-safe).

invalidation:
  whole_session: [baseline_revision changes, default branch changes]
  per_artifact: see SYNC_STATE.yaml context_invalidators bound in CONTEXT_ARTIFACTS.md §3.2
