schema_version: 1
purpose: >-
  Canonical lookup: HTTP API mount → owning module and client consumers (framework
  1.2.0). Derived from DEPENDENCY_GRAPH.yaml runtime.route_registration + consumes-api
  edges; summarizes them and never outranks them (knowledge/README.md Rule 3).
  Consumed by boundary-collision (G1.5) to detect API-ownership collisions and by
  dependency/architecture review, without re-reading routes/v1/index.ts or client code.
scope: project-runtime
derived_from: [.claude/knowledge/DEPENDENCY_GRAPH.yaml]
version_source: .claude/VERSION.yaml
observed_revision: 9142beeed0af10aaff6f4b46b2c5a775ab4833a5  # rebound by SYNC-020

# All routes are mounted under /api/v1 (backend/src/app.ts:51). optionalAuthMiddleware
# is applied to the whole v1 router; authMiddleware/requireRole/requirePermission/
# checkHotelAccess are applied per-module in each routes.ts.

apis:
