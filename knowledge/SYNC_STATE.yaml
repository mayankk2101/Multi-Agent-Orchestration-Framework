      reserved human authority per Engineering Constitution §20.
    authority_needed: human

  - id: SYNC-008
    type: specification
    status: in-review
    description: >-
      SPEC-JOB-DISPATCH-001 (Job Dispatch & Assignment Management) authored at v0.2.0, status REVIEW
      (docs/03-modules/job-dispatch/MODULE_SPEC.md). One bounded capability over backend-work-requests,
      backend-work-applications, backend-assignments. Current-state marketplace behavior specified and
      cross-checked against target authorities (PIVOT_DESIGN_DOCUMENT.md, CONFIRMED_REQUIREMENTS_REGISTER.md);
      12 migration gaps recorded (marketplace apply/accept is retired by the confirmed two-tier calendar+broadcast
      model). G4 reviews complete: architecture BLOCKED, security FAIL (1 Critical/2 High), dependency/consistency/
      performance PASS_WITH_ACTIONS. G6 documentation-validation + QA and the v0.2.0 consistency re-review are
      BLOCKED by an execution-session limit (environment) and must be completed before G2. All blocking findings
      are human-authority items. Registry specification pointers updated to @0.2.0 (REVIEW). MODULE_SPEC NOT frozen.
    authority_needed: human  # G2 freeze; OQ-01 CRITICAL remediation decision; SYNC-001 ownership; FIND-ARCH-003 coupling DR

  - id: SYNC-009
    type: specification
    status: in-review
    description: >-
      SPEC-NOTIF-001 (Notifications) authored at v0.1.1, status REVIEW
      (docs/03-modules/notifications/MODULE_SPEC.md). One bounded capability over backend-notifications
      (Notification model, NotificationType/NotificationChannel enums, notification-service contract
      consumed by backend-work-requests/work-applications/attendance/quality and by frontend-web/
      mobile-worker/mobile-checker). Current-state persist-only/IN_APP-default behavior reverse-specified
      (15 requirements, 7 rules) and cross-checked against target authorities (PIVOT_DESIGN_DOCUMENT.md,
      CONFIRMED_REQUIREMENTS_REGISTER.md); 12 migration gaps recorded (push-only delivery is entirely
      unbuilt despite declared-but-unwired APNs/FCM config; zero NotificationType values exist for 8+
      confirmed target trigger categories). G4 reviews complete: architecture/dependency/consistency/
      security/performance all PASS_WITH_ACTIONS, zero Critical/High findings. All 15 author-fixable
      findings applied in v0.1.1 (one was a factual error in the performance section's index-usage claim,
      corrected). G6 documentation-validation PASS_WITH_ACTIONS. 9 open decisions carried (OQ-NOTIF-01..09),
      two elevated to required-before-milestone-work disposition (OQ-NOTIF-01 Decision Record before
      TREQ-002/012 planning; OQ-NOTIF-02 GDPR retention-tier mapping before G8 Release Readiness).
      Registry specification pointer updated to @0.1.1 (REVIEW). MODULE_SPEC NOT frozen (G2 human).
      Discovered incidental drift (not remediated by this session, noted in MODULE_REGISTRY.yaml header/
      unresolved instead): backend-attendance/backend-quality specification fields were never synchronized
      after SPEC-ATT-001/SPEC-QUAL-001 merged (PRs #109-#111).
    authority_needed: human  # G2 freeze; OQ-NOTIF-01 Decision Record; OQ-NOTIF-02 retention-tier decision; SYNC-001 ownership

  - id: SYNC-010
    type: specification
    status: blocked
    description: >-
      SPEC-ANALYTICS-001 (Analytics) authored at v0.1.1, status REVIEW
      (docs/03-modules/analytics/MODULE_SPEC.md). One bounded capability over backend-analytics —
      a pure read-only, no-owned-state cross-module aggregator (leaderboard, dashboard stats,
      hotel summary) reading six state domains owned by five other modules. Current-state behavior
      reverse-specified (16 requirements, 6 rules) and cross-checked against target authorities
      (PIVOT_DESIGN_DOCUMENT.md, CONFIRMED_REQUIREMENTS_REGISTER.md); 4 migration gaps recorded for
      the confirmed "basic analytics" scope (active workers/day, rooms completed per worker,
      rating/warning counts, sick/vacation counts per hotel) — one (rooms completed per worker,
      OQ-ANALYTICS-03) directly conflicts with the confirmed no-room-level-task-layer decision and
      is left unresolved as a blocking product question. G4 reviews complete: architecture/
      dependency/consistency/performance all PASS_WITH_ACTIONS, zero Critical/High findings, all
      author-fixable findings applied in v0.1.1. Security review returned **FAIL** (1 Critical,
      1 Medium): `GET /analytics/leaderboard`(`/by-hotel/:hotel_id`) has no `requireRole`/
      `checkHotelAccess` gate — any authenticated actor of any role can read any other hotel's
      worker names + performance ratings, unlike this module's own `/stats`/`/hotel-summary` and
      the sibling `/quality/leaderboard` route, which guards the identical `WorkerOverallRating`
      data. This is a live defect in already-deployed code, not a documentation gap; v0.1.1 records
      it as BLOCKING for G2 freeze per Constitution §12 pending a code fix or an authorized,
      time-bounded Risk Assessment — it is NOT resolved by this specification. G6 documentation-
      validation PASS_WITH_ACTIONS (one non-blocking Low finding, a dangling internal
      cross-reference in Proposed Knowledge Deltas). 11 open decisions carried (OQ-ANALYTICS-01..11),
      with OQ-ANALYTICS-01 (security Critical) and OQ-ANALYTICS-03 (rooms-completed-per-worker
      conflict) both blocking further product/architecture progress. Dependency review additionally
      confirmed `edge-analytics-reads-hotel-worker` is a genuine missing DEPENDENCY_GRAPH.yaml edge
      (FIND-DEP-001) — proposed, not applied; requires a dependency-synchronization pass. Registry
      specification pointer updated to @0.1.1 (REVIEW). MODULE_SPEC NOT frozen (G2 human).
    authority_needed: human  # G2 freeze; OQ-ANALYTICS-01 Critical security fix-or-Risk-Assessment decision; OQ-ANALYTICS-03 rooms-completed-per-worker product decision; SYNC-001 ownership; OQ-ANALYTICS-11 platform-wide cross-module-read Decision Record

  - id: SYNC-011
    type: specification
    status: blocked
    description: >-
      SPEC-AUTH-001 (Authentication & Authorization) authored at v0.2.1, status REVIEW
      (docs/03-modules/auth/MODULE_SPEC.md). One bounded capability over backend-auth (signup,
      login, refresh, logout, password-reset, profile; auth-middleware contract owned by
      backend-auth and consumed by every other active backend module; permissions-middleware
      contract, owner unassigned, documented here as the functional RBAC mechanism this
      capability depends on though not owned or consumed by backend-auth itself; User/Session
      state, User shared-write with backend-users per SYNC-005). Current-state behavior
      reverse-specified (24 requirements, 9 rules) and paired with 10 target-state requirements/
      6 target rules drawn from CONFIRMED_REQUIREMENTS_REGISTER.md §1/§2/§25/§27 and
      PIVOT_DESIGN_DOCUMENT.md §4.1/§4.3/§4.13/§5.2/§5.3/§5.4/§9.1/§9.3/§10/§12 (5-role model
      adding Regional Manager, JWT scope claim, MFA for managers, email-mediated forgot-password,
      failed-login manager notification); 8 migration gaps recorded. G4 reviews complete:
      architecture/dependency/consistency/performance all PASS_WITH_ACTIONS, zero Critical/High
      findings, all author-fixable findings applied in v0.2.0. Security review returned **FAIL**
      (1 Critical, 4 High) against live backend-auth code: `POST /auth/password-reset` is public,
      token-less, and unconditionally overwrites any active account's password_hash + revokes all
      sessions from only a known email address (Critical — "a complete, self-service,
      zero-interaction account-takeover primitive against every active account in the system");
      JWT_REFRESH_SECRET silently falls back to JWT_SECRET when unset, collapsing access/refresh
      token-type separation; checkHotelAccess() gives admin/manager/checker a blanket,
      zero-DB-query bypass, so no hotel-scope is enforced for those roles; Session.refresh_token
      is stored in cleartext (no hash-at-rest, unlike password_hash); and zero MFA exists anywhere
      to compensate for the above given CONFIRMED §2 requires it for Hotel Manager and above (all
      High). The reviewer independently confirmed the specification's documentation of every one
      of these behaviors is accurate and complete — the FAIL attaches to the underlying code, not
      to the document — mirroring the SYNC-010 precedent for SPEC-ANALYTICS-001. v0.2.0 records
      this as BLOCKING for G2 freeze per Constitution §12 pending a code fix or an authorized,
      time-bounded Risk Assessment; it is NOT resolved by this specification. G6 documentation-
      validation PASS_WITH_ACTIONS (three non-blocking Medium/Low findings — a self-contradictory
      route-protection count, a stale registry-delta target version, an off-by-one test citation —
      corrected in v0.2.1). 15 open decisions carried (OQ-AUTH-01..15), with OQ-AUTH-05 (password-
      reset, Critical), OQ-AUTH-04 (refresh-secret fallback, High), OQ-AUTH-06 (checkHotelAccess
      bypass, High), and OQ-AUTH-15 (cleartext session tokens, High, new from security review) all
      blocking. Dependency review additionally confirmed DEPENDENCY_GRAPH.yaml's
      permissions-middleware.consumers incorrectly included backend-assignments (FIND-001,
      independently corroborated by architecture review) — corrected directly in this
      synchronization pass (backend/src/modules/assignments/routes.ts imports only authMiddleware,
      not middleware/permissions). Registry specification pointer updated to @0.2.1 (REVIEW).
      MODULE_SPEC NOT frozen (G2 human). TERMINOLOGY.md updated with Session/Access token/Refresh
      token/auth-middleware/permissions-middleware/Scope/Regional Manager proposed entries and
      [TARGET] cross-notes on the four existing role rows, per the spec's own Proposed Knowledge
      Deltas.
    authority_needed: human  # G2 freeze; OQ-AUTH-05 Critical password-reset fix-or-Risk-Assessment decision; OQ-AUTH-04/06/15 High fix-or-Risk-Assessment decisions; OQ-AUTH-02 MFA storage model; OQ-AUTH-07 permissions-middleware ownership reassignment; SYNC-001 ownership; SYNC-005 state-user dual-writer

  - id: SYNC-012
    type: framework-change
    status: resolved-pending-ratification
    description: >-
      Platform v1.2.0 implemented as backward-compatible, fail-safe extensions:
      the reusable Context Artifacts (constitution/CONTEXT_ARTIFACTS.md), LOOP_CONTROL
      §7 Incremental Correction and §8 Evidence Reuse, the pre-authoring Boundary
      Collision gate G1.5 (workflows/boundary-collision.md; REVIEW_GATES.md),
      Repository Session mode (SESSION_STATE.yaml), Module Memory (MODULE_MEMORY.yaml),
      Dependency-slice caching (ART-DEPCTX), and six canonical lookup indexes
      (SPECIFICATION/OWNERSHIP/STATE_OWNERSHIP/CONTRACT/API/BOUNDARY). Independent
      architecture/dependency/consistency/security/performance reviews were run on
      the change set; architecture initially FAILed on two contained defects (version
      not bumped; missing Decision Record), both remediated (VERSION.yaml -> 1.2.0;
      ADR-009). All other reviews PASS_WITH_ACTIONS; findings applied or tracked (see
      .claude/PLATFORM_V1_2_VALIDATION.md). VERSION.yaml bumped 1.1.0 -> 1.2.0.
      Constitutional additions trace to ADR-009 and preserve every prior guarantee;
      formal human ratification of the constitutional articles (CONTEXT_ARTIFACTS,
      LOOP_CONTROL §7-8, gate G1.5) remains reserved human authority per Engineering
      Constitution §20.
    authority_needed: human  # ADR-009 ratification (Proposed -> Accepted); constitutional articles

context_invalidators:
  - repository revision changes
  - default branch changes
  - architecture or ownership decision
  - canonical terminology or business-rule change
  - contract, event, schema, package, or consumer change
  - specification status or version change  # invalidates SPECIFICATION_INDEX and affected Module Memory
  - framework version change  # invalidates Boot Context

