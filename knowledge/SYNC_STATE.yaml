  - id: SYNC-013
    type: framework-change
    status: resolved
    description: >-
      Platform v1.3.0 (Specification Issues Register) implemented as an additive,
      backward-compatible extension: the permanent cross-specification register
      (.claude/governance/SPECIFICATION_ISSUES_REGISTER.md), synchronization
      hooks in workflows/documentation.md (exit condition) and
      workflows/postflight.md (ART-POST-004a), and the SIR ID prefix
      (workflows/README.md). Initialized from SYNC-001/002/005/008/009/010/011/012
      and every module specification's own Open Decisions/Findings sections; all
      seeded issues re-verified against the worktree at ba1d78c, none proven
      resolved. Two genuinely new issues discovered during initialization and
      recorded in the register (not duplicated here): (a) the MODULE_REGISTRY/
      SPECIFICATION_INDEX synchronization gap already known for backend-attendance/
      backend-quality (SYNC-009 tail) extends to a third module, backend-hr
      (SPEC-HR-001 v0.2.1 exists but both indexes still read spec:none/UNKNOWN),
      and docs/03-modules/onboarding/MODULE_SPEC.md has no corresponding
      MODULE_REGISTRY.yaml module id at all; (b) OWNERSHIP_INDEX.yaml,
      BOUNDARY_INDEX.yaml, MODULE_MEMORY.yaml, SPECIFICATION_INDEX.yaml, and this
      file's own cache_state all still key off baseline_revision 5b16be40 while
      current HEAD is ba1d78c (PR #117 merged the HR/onboarding-adjacent/calendar/
      crm/employee-management specs and ADR-001..009 after those caches were last
      bound) — per the fail-safe invariant these caches are stale and should be
      treated as such until a full repository-synchronization pass re-binds them;
      not remediated by this change (scope: register creation, not full re-sync).
      No constitutional article added; ADR-009's pending ratification (SYNC-012)
      is unaffected. VERSION.yaml bumped 1.2.0 -> 1.3.0.
      Independent architecture/dependency/consistency/security/performance review
      of this change set was run (framework precedent: SYNC-007, SYNC-012).
      Architecture initially returned FAIL on two High findings: the register's
      placement under .claude/governance/ (outside knowledge/) read as a direct
      contradiction of CLAUDE.md's Knowledge Separation "exclusively"/"do not mix"
      wording; and the absence of a Decision Record for the new governance/
      directory and SIR artifact class. Both remediated: ADR-010 authored
      (docs/09-decisions/architecture-decisions/ADR-010-governance-layer-
      specification-issues-register.md), establishing governance/ as an explicit
      third top-level category and amending CLAUDE.md accordingly; LOOP_REGISTRY.yaml
      produced_artifacts synced for documentation/postflight (architecture Medium).
      Dependency review found the initial population materially incomplete against
      its own claimed sources (Medium-High): 8 HR open decisions (OD-HR-03/04/05/
      07/08/09/11/16), 5 Analytics open items (OQ-ANALYTICS-07..11), and the
      Notifications migration-gap table were omitted at initialization — all
      remediated by appending the missing rows (one, OQ-ANALYTICS-11, additionally
      promoted to a new Global row since it is platform-wide, not analytics-scoped).
      This SYNC-013 description itself understated that gap in its first revision;
      corrected here per dependency review FIND-005. Consistency review found
      FRAMEWORK_RELEASE_NOTES.md's stale 1.2.0-"(current)" claim and matching stale
      1.3.0 roadmap note (both corrected), a de-duplication-scope ambiguity in the
      register's own Update Protocol (clarified as within-section, with cross-
      section thin cross-references permitted), a column-header drift in 6 of 8
      module tables (normalized to the declared "Canonical source(s)"), and a
      missing ART-POST-004a reference in postflight.md's Lead Architect Outputs
      line (added). Performance review found the register-sync step did not
      inherit the framework's existing nonsemantic-correction exemption (High;
      added a no-op carve-out to documentation.md) and recommended scoping
      postflight.md's ART-POST-004a to the affected-module slice (done), per-module
      "Last verified" markers (added), and an archival trigger for the register's
      unbounded growth (added to the Update Protocol). Security review found no
      blocking defect; recorded a Note that the register's access control must not
      be looser than the strictest module spec it aggregates (added to the
      register's header) pending human confirmation of the repository's/.claude/'s
      publication boundary.
    authority_needed: human  # ADR-010 ratification; optional repository-synchronization pass to re-bind the stale caches noted above; publication-boundary confirmation

  - id: SYNC-014
    type: specification
    status: in-review
    description: >-
      SPEC-CRM-001 (CRM / Hotel & Organization Management) authored at v0.1.1,
      status REVIEW (docs/03-modules/crm/MODULE_SPEC.md). One bounded capability
      over backend-crm -- sole authoritative writer of Hotel state (state-hotel),
      read by backend-work-requests and backend-hotel-workers, consumed by
      frontend-web. Current-state Hotel CRUD reverse-specified (5 requirements,
      6 rules) and cross-checked against target authorities
      (PIVOT_DESIGN_DOCUMENT.md, CONFIRMED_REQUIREMENTS_REGISTER.md); 7 migration
      gaps recorded (Hotel Group/Organization entity, manager write-authority
      contradiction, pause-jobs toggle, scope+Regional-Manager role, unused
      contact fields, dedicated-manager association, shared billing). G4 reviews
      complete: architecture/dependency/consistency/security/performance ALL
      PASS_WITH_ACTIONS, zero Critical/High findings across all five -- this is
      the first CRM-family freeze candidate (alongside Calendar,
      Employee-Management) to clear its first G4 round without any FAIL. All
      26 findings were Medium/Low/Note and author-fixable at the documentation
      level; applied in full at v0.1.1 (corrected REQ-CRM-005 acceptance
      criteria after security review independently discovered the list does
      not default-exclude soft-deleted hotels; fixed three 400->422 error-code
      citations; disclosed the checkHotelAccess admin/manager/checker bypass;
      corrected a false "FEATURE_* convention already exists" claim inherited
      from PDD; four new open decisions OD-CRM-14..17 added for
      human/architecture-authority items). 17 open decisions carried
      (OD-CRM-01..17); OD-CRM-01/02/05/10/11 already gated FROZEN status at
      v0.1.0 and remain open; none of the four new items is blocking.
      Consistency review additionally found docs/03-modules/onboarding/MODULE_SPEC.md
      asserts settled Hotel/Hotel-Group ownership ("Hotels module owns Hotel
      and Hotel Group records") directly conflicting with this spec's own
      OD-CRM-01 (widened into OD-CRM-06); also flagged and prevented a
      canonical-terminology-authority collision with SPEC-AUTH-001 over
      "Regional Manager"/"Scope" before the Knowledge Delta could silently
      reattribute it. Architecture review additionally found a platform-wide
      route-nesting execution coupling (CRM<->hotel-workers, also
      work-requests<->work-applications; OD-CRM-15) and a one-sided pause-jobs
      cross-module contract with the not-yet-aware job-dispatch spec
      (OD-CRM-16). DEPENDENCY_GRAPH.yaml edge-frontend-crm reclassified
      unknown->conditional (FIND-DEP-CRM-002). Registry specification pointer
      updated to @0.1.1 (REVIEW). MODULE_SPEC NOT frozen (G2 human).
