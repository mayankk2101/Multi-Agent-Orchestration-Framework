    type: dependency-graph
    status: resolved
    description: DEPENDENCY_GRAPH.yaml provides complete repository-backed relationship discovery (reconciled with main PR #103). Records notification-service calls edges, cross-module reads-state/writes-state Prisma access, frontend/mobile consumes-api edges, operations deploys-to edges, and 13 state-domains with owning module; no event bus exists (events verified absent). Owner tokens conformed to `unassigned`.
