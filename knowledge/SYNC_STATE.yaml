    description: Active documentation tree requires artifact-level authority classification.
  - id: SYNC-005
    type: state-ownership
    status: blocked
    description: State domains are mapped to an owning module, but the single authoritative writer for shared-write models (state-user - auth+users; state-audit-log - shared via BaseService) is UNKNOWN and requires a human ownership decision (see DEPENDENCY_GRAPH.yaml pending_verification).
    authority_needed: human
  - id: SYNC-006
    type: documentation-authority
    status: pending
    description: Bootloader (.claude/CLAUDE.md) refers to the knowledge layer as "knowledge/" while the actual location is ".claude/knowledge/"; canonical knowledge-path wording to be reconciled (framework doc, human/framework authority).
