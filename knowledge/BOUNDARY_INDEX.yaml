schema_version: 1
purpose: >-
  Canonical lookup: module → its ownership footprint (owned state domains, owned
  contracts, owned API mounts, accountable owner) for the Boundary Collision gate
  (G1.5, framework 1.2.0). This is the consolidated per-module view that
  boundary-collision reads to detect ownership collisions in one lookup instead of
  cross-referencing OWNERSHIP/STATE_OWNERSHIP/CONTRACT/API indexes separately.
  Derived from MODULE_REGISTRY.yaml + DEPENDENCY_GRAPH.yaml; summarizes them and
  never outranks them (knowledge/README.md Rule 3).
scope: project-runtime
derived_from: [.claude/knowledge/MODULE_REGISTRY.yaml, .claude/knowledge/DEPENDENCY_GRAPH.yaml]
version_source: .claude/VERSION.yaml
observed_revision: 9142beeed0af10aaff6f4b46b2c5a775ab4833a5  # rebound by SYNC-020

# A module "owns" a state domain when it is that domain's authoritative_writer, a
# contract when it is the contract's owner_module, and an API when it is the mount's
# module. A collision at G1.5 is any scoped change that would give a second owner to
# an already-owned item, write a domain whose authoritative_writer is another module
# or UNKNOWN, or contradict a business-rule authority.

modules:
  - module: backend-auth
    owner: unassigned
    owned_state: [state-session]
    shared_write_state: [state-user]   # dual-writer with backend-users (collision, SYNC-005)
    owned_contracts: [auth-middleware]
    owned_apis: [/api/v1/auth]
    boundary: Authentication, session issuance, authorization middleware.
  - module: backend-users
    owner: unassigned
    owned_state: []
    shared_write_state: [state-user]
    owned_contracts: []
    owned_apis: [/api/v1/users]
    boundary: User CRUD; shares User writes with backend-auth.
  - module: backend-crm
    owner: unassigned
    owned_state: [state-hotel]
    owned_contracts: []
    owned_apis: [/api/v1/crm]
    boundary: Hotel/CRM records. Canonical home of the Hotels capability (SPEC-CRM-001); "Hotels module" is an alias for this module, not a standalone boundary -- no SPEC-HOTELS-001/backend-hotels exists (ADR-011, SIR-GLOB-013).
  - module: backend-hotel-workers
    owner: unassigned
    owned_state: [state-hotel-worker]
    owned_contracts: []
    owned_apis: ["/api/v1/crm/hotels/:hotel_id/workers"]
    boundary: Hotel-worker roster; reads state-hotel, state-user.
  - module: backend-work-requests
    owner: unassigned
    owned_state: [state-work-request]
    owned_contracts: []
    owned_apis: [/api/v1/work-requests]
    boundary: Work-request lifecycle; state-work-request also written by work-applications (accept tx coupling).
  - module: backend-work-applications
    owner: unassigned
    owned_state: [state-work-application]
    cross_module_writes: [state-work-request, state-worker-assignment, state-attendance]  # accept-application tx (approved-coupling decision pending)
    owned_contracts: []
    owned_apis: ["/api/v1/work-requests/:id/applications"]
    boundary: Applications + accept-application transaction provisioning other domains.
  - module: backend-assignments
    owner: unassigned
    owned_state: [state-worker-assignment]   # record created by work-applications, owned/updated here
    owned_contracts: []
    owned_apis: [/api/v1/assignments]
    boundary: Worker assignment lifecycle.
  - module: backend-attendance
    owner: unassigned
    owned_state: [state-attendance]
    owned_contracts: []
    owned_apis: [/api/v1/attendance]
    boundary: Attendance records; seeded by work-applications accept tx.
  - module: backend-quality
    owner: unassigned
    owned_state: [state-quality-verification, state-rating, state-worker-overall-rating]
    owned_contracts: []
    owned_apis: [/api/v1/quality]
    boundary: Quality verification + ratings aggregation.
  - module: backend-notifications
    owner: unassigned
    owned_state: [state-notification]
    owned_contracts: [notification-service]
    owned_apis: [/api/v1/notifications]
    boundary: Notification persistence + fan-out contract consumed by four modules.
  - module: backend-analytics
    owner: unassigned
    owned_state: []   # pure read-only aggregator, no owned state
    owned_contracts: []
    owned_apis: [/api/v1/analytics]
    boundary: Read-only cross-module aggregation (leaderboard/stats/hotel-summary). Reads 6 graphed domains owned by others plus state-hotel-worker via a known-missing edge (edge-analytics-reads-hotel-worker, SYNC-010/FIND-DEP-001) = 7; leaderboard route missing authorization (Critical, SYNC-010).
  - module: backend-hr
    owner: unassigned
    owned_state: []
    owned_apis: [/api/v1/hr]
    boundary: Stub (NotImplementedError); mounted + consumed by mobile-worker. Canonical home of the Contracts capability (SPEC-HR-001) -- contract lifecycle, templates, generation, metadata, versions, amendments, signatures, manager confirmation, acceptance workflow, renewals, expiry, and archival state; "Contracts module"/"Contracts/HR module"/"Contract Management module" is an alias for this module, not a standalone boundary -- no SPEC-CONTRACTS-001/backend-contracts exists (ADR-012, SIR-GLOB-014). Onboarding, employee-management, Documents, Payslips, and Compliance consume this capability; they do not own it.
  - module: backend-calendar
    owner: unassigned
    owned_state: []
    owned_apis: [/api/v1/calendar]
    boundary: Stub (NotImplementedError); mounted, no consumer. Canonical home of the Calendar capability (SPEC-CALENDAR-001) and, by extension, Scheduling -- Scheduling is not a standalone boundary; no SPEC-SCHEDULING-001/backend-scheduling exists and future scheduling functionality evolves SPEC-CALENDAR-001 (ADR-011, SIR-GLOB-013).
  - module: frontend-web
    owner: unassigned
    boundary: Next.js web client; consumes-api only, owns no backend state/contract.
  - module: mobile-worker
    owner: unassigned
    boundary: Expo worker client; consumes-api only.
  - module: mobile-checker
    owner: unassigned
    boundary: Expo checker client; consumes-api only.
  - module: operations
    owner: unassigned
    boundary: Infrastructure/deploy surface; deploys-to backend + frontend.

unregistered_or_shared:
  - { item: state-user, note: dual-writer backend-auth/backend-users — UNKNOWN authoritative writer (G1.5 collision) }
  - { item: state-audit-log, note: shared-write via BaseService.logAudit — no single owner (G1.5 collision) }
  - { item: prisma-schema / base-service / permissions-middleware / validation-middleware, note: owner unassigned (shared contracts) }
  - { item: backend-geo, note: placeholder-unregistered stub; no footprint }
  - { item: backend-chatbot, note: "placeholder-unregistered stub (backend/src/modules/chatbot/.placeholder only; not imported/mounted). Canonical home of the Chatbot / AI-execution capability (SPEC-CHATBOT-001) -- conversation lifecycle, LLM provider abstraction, prompts, orchestration, context assembly, tool execution, memory, AI sessions, token/cost management, guardrails, and AI audit. Resolved a Boundary Collision Gate (G1.5) FAIL against a first-person execution claim in docs/03-modules/onboarding/MODULE_SPEC.md (Sec 3, Sec 5 item 3, Sec 6.3, Sec 18); ADR-013 (Accepted) settles it: backend-onboarding owns the onboarding business workflow and consumes Chatbot via IF-CHATBOT-* interfaces, not first-person execution (docs/03-modules/onboarding/MODULE_SPEC.md v1.1). See SYNC-027, SYNC-028, SIR-GLOB-015 (RESOLVED)." }
  - { item: backend-documents (proposed, not registered), note: "Documents capability specified at SPEC-DOCUMENTS-001@0.1.2 (REVIEW); zero code exists (no backend/src/modules/documents, no Document/WorkerDocument Prisma model) so no module entry is added to this index, MODULE_REGISTRY.yaml, or SPECIFICATION_INDEX.yaml — a G1.5 Boundary Collision Gate PASS (SYNC-025) confirmed no other module claims this capability; hr/employee-management/onboarding all disclaim it and attribute it to this conceptual module, consistent with ADR-012 naming Documents only as a Contracts consumer. The only document-adjacent code today is backend-hr's narrow, self-disclosed stub (POST /workers/:worker_id/documents) — architectural debt (SIR-DOC-015/OD-DOC-015), not this capability's own footprint." }

invalidated_by: [architecture or ownership decision, schema/contract/API change, MODULE_REGISTRY/DEPENDENCY_GRAPH revision change]
