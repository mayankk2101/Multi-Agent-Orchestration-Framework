schema_version: 1
purpose: >-
  Canonical lookup: accountable owner per module, shared contract, and state
  domain (framework 1.2.0). Derived from MODULE_REGISTRY.yaml + DEPENDENCY_GRAPH.yaml;
  summarizes them and never outranks them (knowledge/README.md Rule 3). Consumed by
  boundary-collision (G1.5) to detect ownership collisions without re-reading the
  registry/graph. `unassigned` is an evidence-backed value (no CODEOWNERS; empty
  package.json author), never an invented owner (SYNC-001, blocked, human authority).
scope: project-runtime
derived_from: [.claude/knowledge/MODULE_REGISTRY.yaml, .claude/knowledge/DEPENDENCY_GRAPH.yaml]
version_source: .claude/VERSION.yaml
observed_revision: 09e0b162297162c8a93975ce55ccd3c406218606  # rebound by Repository Synchronization Workflow (Revision Rebind mode, SYNC-037) -- stamp-only, no content change; prior stamp 39fc1f5 (Package A, AUDIT-REPO-2026-07-14: ADR-016 propagated, state-audit-log authoritative_writer UNKNOWN -> backend-auth, stale collision_flags row removed) was two merges behind HEAD; content verified unchanged 39fc1f5..09e0b16

module_owners:  # every module owner is unassigned by evidence (SYNC-001)
  default: unassigned
  note: All 19 registered modules have owner=unassigned; no CODEOWNERS exists and backend/package.json author is empty.

contract_owners:
  - { contract: notification-service, owner_module: backend-notifications }
  - { contract: auth-middleware, owner_module: backend-auth }
  - { contract: prisma-schema, owner_module: unassigned }
  - { contract: base-service, owner_module: unassigned }
  - { contract: permissions-middleware, owner_module: unassigned }  # OQ-AUTH-07 reassignment pending (SYNC-011)
  - { contract: validation-middleware, owner_module: unassigned }

state_owners:  # authoritative writer per state domain (see STATE_OWNERSHIP_INDEX for full writer/reader sets)
  - { domain: state-session, authoritative_writer: backend-auth }
  - { domain: state-hotel, authoritative_writer: backend-crm }
  - { domain: state-hotel-worker, authoritative_writer: backend-hotel-workers }
  - { domain: state-work-request, authoritative_writer: backend-work-requests }
  - { domain: state-work-application, authoritative_writer: backend-work-applications }
  - { domain: state-worker-assignment, authoritative_writer: backend-assignments }
  - { domain: state-attendance, authoritative_writer: backend-attendance }
  - { domain: state-quality-verification, authoritative_writer: backend-quality }
  - { domain: state-rating, authoritative_writer: backend-quality }
  - { domain: state-worker-overall-rating, authoritative_writer: backend-quality }
  - { domain: state-notification, authoritative_writer: backend-notifications }
  - { domain: state-user, authoritative_writer: UNKNOWN }       # auth + users both write (SYNC-005, human)
  - { domain: state-audit-log, authoritative_writer: backend-auth }  # resolved by ADR-016 (Accepted, 2026-07-14); physical writes remain shared via BaseService.logAudit (unchanged by this record); backend-compliance is a read-only consumer, never a writer

collision_flags:  # bearing-unknown ownership that G1.5 must escalate rather than silently pass
  - state-user: dual-writer (backend-auth, backend-users); authoritative writer is a human decision
  - all module/contract owners: unassigned pending human assignment (SYNC-001)

invalidated_by: [architecture or ownership decision, MODULE_REGISTRY/DEPENDENCY_GRAPH revision change]
