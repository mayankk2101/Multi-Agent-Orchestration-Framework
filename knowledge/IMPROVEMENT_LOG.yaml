schema_version: 1
purpose: >-
  Deterministic, human-reviewable improvement records produced by the learning
  workflow (.claude/workflows/learning.md). Records capture repeated engineering
  signals. This log proposes; it never mutates policy. Escalations are dispositioned
  by humans under Engineering Constitution §20/§22.
project: hotel-crm

# Signal classes (see workflows/learning.md):
#   repeated-failure | repeated-escalation | repeated-finding |
#   architectural-violation | synchronization-failure | documentation-drift
#
# Record fields:
#   id                stable IMP-<zero-padded-number>
#   signal_class      one of the classes above
#   summary           one-line statement of the recurring signal
#   evidence          paths/revisions/gate reports proving each occurrence
#   occurrences       integer count of observed occurrences
#   recurrence_threshold  occurrences at which the signal escalates
#   status            open | escalated | dismissed | resolved
#   proposed_improvement  reusable change proposed for human disposition
#   confidence        High | Medium | Low (LOOP_CONTROL.md §5)
#   opened_at / updated_at  ISO-8601 date or revision

records:
  - id: IMP-001
    signal_class: documentation-drift
    summary: >-
      Platform version truth diverged across artifacts (SYNC_STATE referenced
      "v1.1.0 governance artifacts" while CHANGELOG/RELEASE_NOTES declared only
      1.0.0 released and 1.1.0 as planned), with no single canonical version source.
    evidence:
      - ".claude/CHANGELOG.md (Version 1.0.0 as released; 1.1.0 as planned)"
      - ".claude/knowledge/SYNC_STATE.yaml:11 (note: v1.1.0 governance artifacts generated)"
      - "No canonical version file existed prior to .claude/VERSION.yaml"
    occurrences: 1
    recurrence_threshold: 2
    status: resolved
    proposed_improvement: >-
      Establish a single canonical version source (.claude/VERSION.yaml) and require
      all version-bearing artifacts to reference it rather than restate a literal.
      Implemented in the platform-audit-improvements change.
    confidence: High
    opened_at: "2026-07-05"
    updated_at: "2026-07-05"

  - id: IMP-002
    signal_class: architectural-violation
    summary: >-
      Reviewer finding structure varied across agents and templates (confidence,
      unknowns, and limitations were inconsistently required), weakening independent
      finding merge.
    evidence:
      - ".claude/agents/*.md Communication Protocol sections (heterogeneous field lists)"
      - ".claude/templates/*_REVIEW_TEMPLATE.md Findings tables (missing confidence/unknowns/limitations columns)"
    occurrences: 1
    recurrence_threshold: 2
    status: resolved
    proposed_improvement: >-
      Define one canonical finding schema (constitution/REVIEWER_FINDINGS.md) and have
      every reviewer/validator and review template reference it. Implemented in the
      platform-audit-improvements change.
    confidence: High
    opened_at: "2026-07-05"
    updated_at: "2026-07-05"

  - id: IMP-003
    signal_class: documentation-drift
    summary: >-
      A reverse specification of implemented code (SPEC-JOB-DISPATCH-001) diverged from confirmed
      target authority: the deployed marketplace apply/accept flow is explicitly retired by the
      CONFIRMED_REQUIREMENTS_REGISTER/PIVOT_DESIGN_DOCUMENT two-tier model, yet no module spec had
      recorded the current-vs-target gap. Multiple open questions raised during authoring (EXPIRED
      owner, cross-module coupling, manager hotel-scoping) were in fact already resolved by an active
      foundation document the initial context package did not include.
    evidence:
      - "docs/03-modules/job-dispatch/MODULE_SPEC.md (v0.2.0 Migration Gaps MIG-GAP-01..12)"
      - "docs/00-foundations/PIVOT_DESIGN_DOCUMENT.md:14,182-184,377-384 (WorkApplication removed)"
      - "docs/00-foundations/CONFIRMED_REQUIREMENTS_REGISTER.md:190-226,437-439 (worker-applications = non-goal)"
    occurrences: 1
    recurrence_threshold: 2
    status: open
    proposed_improvement: >-
      Pre-flight context assembly for any current-state module specification MUST include the active
      target-state foundation documents (PIVOT_DESIGN_DOCUMENT, CONFIRMED_REQUIREMENTS_REGISTER) so
      current-vs-target drift is surfaced before authoring and open questions are checked against
      confirmed authority before being escalated. Consider adding a preflight checklist item:
      "resolve open questions against active foundation docs before recording them as unknowns."
    confidence: High
    opened_at: "2026-07-07"
    updated_at: "2026-07-07"

  - id: IMP-004
    signal_class: repeated-finding
    summary: >-
      Independent security and business-rule reviews both, separately, found the same unguarded
      state mutation: PATCH /assignments/:id (assignments/service.ts:83-118) has no ownership/role/
      hotel authorization, while a route comment asserts a non-existent "service-level guard." The
      convergence of two independent reviewers on one defect indicates missing authorization-coverage
      discipline for state-transition endpoints.
    evidence:
      - "backend/src/modules/assignments/service.ts:83-118; backend/src/modules/assignments/routes.ts:9-14 @f37a39b"
      - "SPEC-JOB-DISPATCH-001 G4 Security review FIND-SEC-001 (Critical); Business-Rule review FIND-BRV-001 (High)"
    occurrences: 1
    recurrence_threshold: 2
    status: open
    proposed_improvement: >-
      Add an authorization-coverage check to the security checklist and to preflight scope validation:
      every state-mutating route must be traced to an explicit authorization guard (route or service),
      and code comments asserting a guard must be verified against the implementation. Flag any
      mutation whose actor identity is used only for audit logging, not for authorization.
    confidence: High
    opened_at: "2026-07-07"
    updated_at: "2026-07-07"

  - id: IMP-005
    signal_class: repeated-finding
    summary: >-
      Independent security review has now returned a G4 FAIL against a module specification's
      accurately-and-completely-documented current-state code twice in a row: SPEC-ANALYTICS-001
      (1 Critical/1 Medium, an unguarded leaderboard route exposing cross-hotel worker data) and
      SPEC-AUTH-001 (1 Critical/4 High, most severely an unauthenticated, token-less POST
      /auth/password-reset that unconditionally overwrites any active account's password and
      revokes its sessions). In both cases the reviewer explicitly confirmed the specification's
      documentation of the behavior was accurate and complete before the review even ran, and the
      defect was a pre-existing live-code condition the documentation workflow surfaced as a side
      effect of reverse-specifying current state, not something introduced by authoring. Both
      cases discovered a genuinely exploitable, already-deployed defect only at G4 — deep into a
      multi-hour, multi-agent documentation pipeline — rather than earlier.
    evidence:
      - "SPEC-ANALYTICS-001 v0.1.1, .claude/knowledge/SYNC_STATE.yaml SYNC-010 (security FAIL, OQ-ANALYTICS-01 Critical)"
      - "SPEC-AUTH-001 v0.2.1, .claude/knowledge/SYNC_STATE.yaml SYNC-011 (security FAIL, OQ-AUTH-05 Critical, OQ-AUTH-04/06/15 High)"
    occurrences: 2
    recurrence_threshold: 2
    status: escalated
    proposed_improvement: >-
      Since this repository is pre-launch with no production employee data (PIVOT_DESIGN_DOCUMENT.md
      §10), these are documentation-discovered live defects, not yet field-exploited ones -- but the
      pattern (two-for-two: every module spec authored so far that touches an authorization or
      trust-boundary surface has uncovered a Critical/High live defect) suggests a light-weight,
      targeted security pass during Pre-flight or Requirements scoping -- before the full multi-hour
      G4 pipeline runs -- would surface exploitable defects faster and let engineering start a fix
      in parallel with documentation authoring rather than waiting for G4. Escalated per Constitution
      §22 for human disposition: consider adding an explicit "known-risk endpoint" fast-path (e.g. a
      narrow, early security-only pass over public/unauthenticated mutating endpoints and any route
      with a blanket role-bypass) to the Documentation Workflow's Pre-flight step, ahead of full G4.
    confidence: High
    opened_at: "2026-07-08"
    updated_at: "2026-07-08"

  - id: IMP-006
    signal_class: synchronization-failure
    summary: >-
      Post-flight knowledge synchronization for SPEC-AUTH-001 inserted 7 new rows into
      TERMINOLOGY.md's Project Term Candidates table, shifting every line below the insertion
      point by +7. Six literal line-number citations pinned into three already-authored,
      REVIEW-status sibling specs (analytics, calendar, quality) silently resolved to the wrong
      table row afterward (a separator or an unrelated row, not an error) rather than failing
      loudly. Caught only by the post-flight Consistency Reviewer's explicit repository-wide grep
      for `TERMINOLOGY.md:<line>` citations, not by any automated check.
    evidence:
      - ".claude/knowledge/TERMINOLOGY.md (SYNC-001 owner-token row: line 44 -> 51; none-observed row: line 45 -> 52, commit 189335c)"
      - "docs/03-modules/analytics/MODULE_SPEC.md:22,268,494; docs/03-modules/calendar/MODULE_SPEC.md:274; docs/03-modules/quality/MODULE_SPEC.md:210,520 (corrected in commit 289a86a)"
    occurrences: 1
    recurrence_threshold: 2
    status: open
    proposed_improvement: >-
      Cross-artifact citations into a shared, append-only knowledge file (TERMINOLOGY.md,
      MODULE_REGISTRY.yaml, DEPENDENCY_GRAPH.yaml) should reference a stable anchor -- the term
      name or a stable row id -- rather than a literal line number, wherever the citation's own
      purpose is "point at this canonical token" rather than "point at this exact historical
      revision." Post-flight synchronization workflow should add a repository-wide check for
      `<knowledge-file>:<line>`-style citations whenever the cited file is edited, so a shifted
      citation is caught mechanically rather than only by an agent's manual grep.
    confidence: Medium
    opened_at: "2026-07-08"
    updated_at: "2026-07-08"
