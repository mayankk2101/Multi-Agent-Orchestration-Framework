# /etc/nginx/sites-available/hotelcrm
# TLS termination on EC2 for the no-ALB MVP path.
# Preferred: terminate TLS at an AWS ALB with an ACM certificate and proxy to
# this Nginx over the private SG. For the no-ALB MVP, obtain a certificate with
# certbot (Let's Encrypt) and point ssl_certificate(_key) at the issued files,
# e.g. /etc/letsencrypt/live/hotelcrm.app/{fullchain,privkey}.pem.
# Install cert: /etc/ssl/hotelcrm/cert.pem + key.pem

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;

# ── API ───────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.hotelcrm.app;

    ssl_certificate     /etc/ssl/hotelcrm/cert.pem;
    ssl_certificate_key /etc/ssl/hotelcrm/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Content-Security-Policy   "default-src 'none'; connect-src 'self' https://hotelcrm-uploads.s3.eu-central-1.amazonaws.com" always;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;
    gzip_vary on;

    # Auth routes — tight rate limit
    location /api/v1/auth {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Block everything else on this vhost
    location / {
        return 404;
    }

    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;
}

# ── Web Frontend ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name hotelcrm.app www.hotelcrm.app;

    ssl_certificate     /etc/ssl/hotelcrm/cert.pem;
    ssl_certificate_key /etc/ssl/hotelcrm/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;
    gzip_vary on;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/web.access.log;
    error_log  /var/log/nginx/web.error.log;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.hotelcrm.app hotelcrm.app www.hotelcrm.app;
    return 301 https://$host$request_uri;
}
