name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Staging Droplet
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --omit=dev
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run migrations (staging)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Staging Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.STAGING_DROPLET_IP }}
          username: deploy
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/hotel-crm
            git fetch origin develop
            git checkout origin/develop
            cd backend
            npm ci --omit=dev
            npm run build
            pm2 restart hotel-crm-api --update-env
            sleep 5
            curl -sf http://localhost:3001/api/v1/health || { echo "Health check failed"; exit 1; }
            echo "Staging deploy successful: $(date -u)"
