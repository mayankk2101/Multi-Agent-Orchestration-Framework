name: Deploy Staging

on:
  push:
    branches: [develop]

# Only one staging deployment may run at a time. Overlapping deploys are
# queued (not cancelled) so an in-flight deploy is never interrupted mid-way.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Staging EC2 instance
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        # Full install (incl. devDependencies): the Build step runs `tsc`,
        # which is a devDependency. `--omit=dev` breaks `npm run build`.
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Validate migration state (staging)
        # Prisma 5.x (`prisma` ^5.12.0) `migrate status` exits non-zero for THREE
        # distinct situations and does NOT let us tell them apart via exit code:
        #   1. pending migrations not yet applied   <- NORMAL before `migrate deploy`
        #   2. failed / partial migrations          <- must abort
        #   3. history drift (DB diverges from repo) <- must abort
        # Gating on the raw exit code would fail every deploy that legitimately
        # ships a new migration (case 1). Instead we inspect the output and abort
        # ONLY on failed migrations or drift, letting `migrate deploy` apply
        # genuinely pending migrations in the next step.
        run: |
          set +e
          STATUS_OUTPUT="$(npx prisma migrate status 2>&1)"
          echo "$STATUS_OUTPUT"
          if echo "$STATUS_OUTPUT" | grep -qiE 'failed|diverge|not in sync|drift'; then
            echo "::error::Migration history shows failed migrations or drift — aborting deploy."
            exit 1
          fi
          echo "Migration state OK (any pending migrations will be applied by migrate deploy)."
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Run migrations (staging)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Staging EC2 instance
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Deploy the exact commit that passed CI rather than a moving
          # origin/develop (avoids racing a newer, untested push to develop).
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host:     ${{ secrets.STAGING_EC2_HOST }}
          username: deploy
          key:      ${{ secrets.STAGING_SSH_KEY }}
          envs:     DEPLOY_SHA
          script: |
            set -e
            cd /opt/hotel-crm
            git fetch origin develop
            git checkout "${DEPLOY_SHA:-origin/develop}"

            # Backend — full install: `npm run build` (tsc) needs devDependencies
            cd /opt/hotel-crm/backend
            npm ci
            npm run build

            # Frontend (B3 — was missing from staging deploy)
            # Full install: `next build` needs typescript + tailwindcss + @tailwindcss/postcss
            cd /opt/hotel-crm/frontend
            npm ci
            npm run build

            # Source secrets so --update-env picks them up (B2 — ssh shell is non-login)
            set -a
            source /etc/hotel-crm/.env
            set +a

            cd /opt/hotel-crm
            pm2 restart hotel-crm-api --update-env
            pm2 restart hotel-crm-web --update-env

            # 15 s gives Node.js time to bind and run startup hooks (was 5 s — GAP-M15)
            sleep 15
            curl -sf http://localhost:3001/api/v1/health || { echo "API health check failed"; exit 1; }
            curl -sf http://localhost:3000 > /dev/null || { echo "Frontend health check failed"; exit 1; }
            echo "Staging deploy successful: $(date -u)"
