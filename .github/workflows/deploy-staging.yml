name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Staging Droplet
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        # Full install (incl. devDependencies): the Build step runs `tsc`,
        # which is a devDependency. `--omit=dev` breaks `npm run build`.
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run migrations (staging)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Staging Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.STAGING_DROPLET_IP }}
          username: deploy
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/hotel-crm
            git fetch origin develop
            git checkout origin/develop

            # Backend — full install: `npm run build` (tsc) needs devDependencies
            cd /opt/hotel-crm/backend
            npm ci
            npm run build

            # Frontend (B3 — was missing from staging deploy)
            # Full install: `next build` needs typescript + tailwindcss + @tailwindcss/postcss
            cd /opt/hotel-crm/frontend
            npm ci
            npm run build

            # Source secrets so --update-env picks them up (B2 — ssh shell is non-login)
            set -a
            source /etc/hotel-crm/.env
            set +a

            cd /opt/hotel-crm
            pm2 restart hotel-crm-api --update-env
            pm2 restart hotel-crm-web --update-env

            # 15 s gives Node.js time to bind and run startup hooks (was 5 s — GAP-M15)
            sleep 15
            curl -sf http://localhost:3001/api/v1/health || { echo "API health check failed"; exit 1; }
            curl -sf http://localhost:3000 > /dev/null || { echo "Frontend health check failed"; exit 1; }
            echo "Staging deploy successful: $(date -u)"
