name: CI

on:
  push:
    branches: ['feature/**', 'fix/**', 'develop', 'main']
  pull_request:
    branches: ['develop', 'main']
  workflow_call:

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hotelcrm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Typecheck
        run: npm run typecheck
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hotelcrm_test

      - name: Tests
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hotelcrm_test
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: test-secret-min-32-characters-long!!
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long!!
          JWT_ACCESS_EXPIRY: 1h
          JWT_REFRESH_EXPIRY: 7d
          APNS_PRIVATE_KEY_BASE64: dGVzdA==
          APNS_KEY_ID: TESTKEY123
          APNS_TEAM_ID: TESTTEAM123
          APNS_BUNDLE_ID: com.zirove.hotelcrm.test
          FIREBASE_PROJECT_ID: test-project
          DO_SPACES_KEY: test
          DO_SPACES_SECRET: test
          DO_SPACES_BUCKET: test-bucket
          DO_SPACES_REGION: fra1
          DO_SPACES_ENDPOINT: https://fra1.digitaloceanspaces.com
          REDIS_URL: ''
