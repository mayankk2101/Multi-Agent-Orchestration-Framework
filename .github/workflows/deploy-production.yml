name: Deploy Production

on:
  push:
    branches: [main]

# Only one production deployment may run at a time. Overlapping deploys are
# queued (not cancelled) so an in-flight deploy is never interrupted mid-way.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production EC2 instance
    runs-on: ubuntu-latest
    needs: ci
    environment: production   # requires manual approval configured in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        # Full install (incl. devDependencies): the Build step runs `tsc`,
        # which is a devDependency. `--omit=dev` breaks `npm run build`.
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Validate migration state (production)
        # Prisma 5.x (`prisma` ^5.12.0) `migrate status` exits non-zero for THREE
        # distinct situations and does NOT let us tell them apart via exit code:
        #   1. pending migrations not yet applied   <- NORMAL before `migrate deploy`
        #   2. failed / partial migrations          <- must abort
        #   3. history drift (DB diverges from repo) <- must abort
        # Gating on the raw exit code would fail every deploy that legitimately
        # ships a new migration (case 1). Instead we inspect the output and abort
        # ONLY on failed migrations or drift, letting `migrate deploy` apply
        # genuinely pending migrations in the next step.
        run: |
          set +e
          STATUS_OUTPUT="$(npx prisma migrate status 2>&1)"
          echo "$STATUS_OUTPUT"
          if echo "$STATUS_OUTPUT" | grep -qiE 'failed|diverge|not in sync|drift'; then
            echo "::error::Migration history shows failed migrations or drift — aborting deploy."
            exit 1
          fi
          echo "Migration state OK (any pending migrations will be applied by migrate deploy)."
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Run migrations (production)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to Production EC2 instance
        uses: appleboy/ssh-action@v1.2.0
        env:
          # The exact commit that triggered this run and passed the CI gate.
          # We deploy this SHA rather than a moving `origin/main` so the box
          # ships precisely the code that was validated (avoids racing a newer,
          # untested push that landed on main after CI started).
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host:     ${{ secrets.PROD_EC2_HOST }}
          username: deploy
          key:      ${{ secrets.PROD_SSH_KEY }}
          envs:     DEPLOY_SHA
          script: |
            set -e
            cd /opt/hotel-crm

            # --- Rollback model (READ BEFORE EDITING) ----------------------------
            # This is a CODE-ONLY rollback: it restores the previous git SHA and
            # rebuilds/restarts the services. It does NOT roll back database
            # migrations — `prisma migrate deploy` has already run in an earlier
            # step. Therefore the rollback ASSUMES MIGRATIONS ARE BACKWARD-
            # COMPATIBLE (the old code can run against the new schema).
            # A destructive / non-backward-compatible migration (dropped column,
            # renamed table, narrowed type, etc.) cannot be recovered by this
            # workflow and REQUIRES MANUAL DB RECOVERY (restore from backup /
            # apply a compensating migration). Keep migrations additive.
            # ---------------------------------------------------------------------

            # Record the currently-deployed SHA so we can roll back to it if the
            # new release fails its health checks (lightweight git-SHA rollback).
            PREV_SHA="$(git rev-parse HEAD)"
            echo "Previous deployed SHA: $PREV_SHA"

            # build_and_restart <git-ref> — checkout, build backend+frontend, reload pm2.
            build_and_restart() {
              git fetch origin main
              git checkout "$1"
              # Full install: `npm run build` (tsc) needs backend devDependencies
              cd /opt/hotel-crm/backend
              npm ci
              npm run build
              # Full install: `next build` needs typescript + tailwindcss + @tailwindcss/postcss
              cd /opt/hotel-crm/frontend
              npm ci
              npm run build
              # Source secrets so --update-env picks them up (non-login ssh shell).
              # Matches staging so production and staging load env consistently.
              set -a
              source /etc/hotel-crm/.env
              set +a
              cd /opt/hotel-crm
              pm2 reload hotel-crm-api --update-env
              pm2 restart hotel-crm-web --update-env
            }

            # Deploy the CI-validated commit (falls back to origin/main only if
            # DEPLOY_SHA was somehow not forwarded, preserving prior behaviour).
            build_and_restart "${DEPLOY_SHA:-origin/main}"

            sleep 10
            if ! curl -sf http://localhost:3001/api/v1/health \
              || ! curl -sf http://localhost:3000 > /dev/null; then
              echo "Health check failed — rolling back to $PREV_SHA"
              build_and_restart "$PREV_SHA"
              sleep 10
              curl -sf http://localhost:3001/api/v1/health || echo "WARNING: rollback health check failed — manual intervention required"
              exit 1
            fi
            echo "Production deploy successful: $(date -u)"

      - name: Tag release
        run: |
          TAG="release/$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
