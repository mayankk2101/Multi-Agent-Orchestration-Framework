name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production Droplet
    runs-on: ubuntu-latest
    needs: ci
    environment: production   # requires manual approval configured in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --omit=dev
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run migrations (production)
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to Production Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.PROD_DROPLET_IP }}
          username: deploy
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/hotel-crm
            git fetch origin main
            git checkout origin/main
            cd backend
            npm ci --omit=dev
            npm run build
            pm2 reload hotel-crm-api --update-env
            cd ../frontend
            npm ci
            npm run build
            pm2 restart hotel-crm-web --update-env
            sleep 10
            curl -sf http://localhost:3001/api/v1/health || { echo "Health check failed — rolling back"; pm2 restart hotel-crm-api; exit 1; }
            echo "Production deploy successful: $(date -u)"

      - name: Tag release
        run: |
          TAG="release/$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
